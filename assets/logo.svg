<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- 背景 -->
  <rect width="200" height="60" rx="8" fill="#0a0e17"/>
  
  <!-- 图标：向上的箭头 + 代码符号 -->
  <g transform="translate(15, 10)">
    <!-- 向上的箭头（上岸） -->
    <path d="M20 35 L20 15 L12 23 M20 15 L28 23" stroke="#00ff88" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 代码括号 -->
    <path d="M8 20 L2 25 L8 30" stroke="#00d4ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M32 20 L38 25 L32 30" stroke="#00d4ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 底部横线（代表陆地/成功上岸） -->
    <line x1="5" y1="38" x2="35" y2="38" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 文字：上岸吧 -->
  <text x="60" y="28" font-family="Noto Sans SC, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">上岸吧</text>
  
  <!-- 文字：DevPrep -->
  <text x="60" y="48" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#00d4ff">DevPrep</text>
  
  <!-- 装饰点 -->
  <circle cx="185" cy="15" r="3" fill="#00ff88"/>
  <circle cx="185" cy="25" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="185" cy="33" r="1.5" fill="#a855f7" opacity="0.4"/>
</svg>